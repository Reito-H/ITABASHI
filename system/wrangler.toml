name = "staff-mgmt"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "staff-db"
database_id = "b50865b1-be1d-411c-bf71-fc9a7da3c5e0"

[vars]
ADMIN_URL_PREFIX = "/admin"
# リッチメニューID: PATTERN1=新人 / PATTERN2=運行管理者 / PATTERN3=統括管理者
RICHMENU_ID_PATTERN1 = "richmenu-7ddc3e80e06b72a49103d5237a89a4ee"
RICHMENU_ID_PATTERN2 = "richmenu-d6458fac74671e573863cf1ea7a9ff04"
RICHMENU_ID_PATTERN3 = "richmenu-d6458fac74671e573863cf1ea7a9ff04"
# LIFFアプリID（LINE Developers で作成後に設定）
LIFF_ID_LOST_ITEM = "2010598812-y7oZBhGe"
LIFF_ID_ACCIDENT = "2010598812-PaLPe9HP"
LIFF_ID_STAFF_LOOKUP = "2010598812-vWkyVtxt"
LIFF_ID_STAFF_LOOKUP_PLUS = "2010598812-8spA8woR"
# シークレット値は wrangler secret put で登録すること（このファイルには記載しない）
# npx wrangler secret put SETUP_KEY
# npx wrangler secret put LINE_CHANNEL_SECRET
# npx wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
# npx wrangler secret put LINE_REG_PWD_VEHICLE    ← 車番管理者 登録パスワード
# npx wrangler secret put LINE_REG_PWD_OPERATIONS ← 運行管理者 登録パスワード
# npx wrangler secret put LINE_REG_PWD_GENERAL    ← 統括管理者 登録パスワード

[[routes]]
pattern = "bentenclub.com/s7db8q6wys*"
zone_name = "bentenclub.com"

[[routes]]
pattern = "bentenclub.com/api*"
zone_name = "bentenclub.com"

[[routes]]
pattern = "bentenclub.com/liff*"
zone_name = "bentenclub.com"

[[routes]]
pattern = "bentenclub.com/form*"
zone_name = "bentenclub.com"

[[routes]]
pattern = "bentenclub.com/robots.txt"
zone_name = "bentenclub.com"

[triggers]
crons = ["0 * * * *"]

# ローカル開発用
[dev]
port = 8787
