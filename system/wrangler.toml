name = "staff-mgmt"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "staff-db"
database_id = "b50865b1-be1d-411c-bf71-fc9a7da3c5e0"

[vars]
ADMIN_URL_PREFIX = "/admin"
# リッチメニューID: PATTERN1=新人 / PATTERN2=運行管理者 / PATTERN3=統括管理者
RICHMENU_ID_PATTERN1 = "richmenu-7ddc3e80e06b72a49103d5237a89a4ee"
RICHMENU_ID_PATTERN2 = "richmenu-a3ccbfff948a0148662ad397e39101b2"
RICHMENU_ID_PATTERN3 = "richmenu-a3ccbfff948a0148662ad397e39101b2"
# LIFFアプリID（LINE Developers で作成後に設定）
LIFF_ID_LOST_ITEM = "2010598812-y7oZBhGe"
LIFF_ID_ACCIDENT = "2010598812-PaLPe9HP"
LIFF_ID_STAFF_LOOKUP = "2010598812-vWkyVtxt"
LIFF_ID_STAFF_LOOKUP_PLUS = "2010598812-8spA8woR"
LIFF_ID_OTHER_FEATURES = "2010598812-C477DCKE"
# 違反報告 LIFF（エンドポイントURL: https://bentenclub.com/liff/violation）
LIFF_ID_VIOLATION = "2010598812-GNdHG7J6"
# 一般報告 LIFF（エンドポイントURL: https://bentenclub.com/liff/general-report）
LIFF_ID_GENERAL_REPORT = "2010598812-HftZFUKb"
# ベンテンクラブ シフト（LINE Developers で LIFF作成後に設定）
LIFF_ID_BENTEN_SHIFT = "2010598812-yt0r1ZAW"
# ベンテン会員・シフトマスター用リッチメニュー（未作成なら空のまま=メニューなし）
RICHMENU_ID_BENTEN = ""
# 乗務社員用リッチメニュー（未作成なら空のまま=メニューなし）
RICHMENU_ID_CREW_MEMBER = "richmenu-1d8eaed8df2c9c29ca0f712ef01cf82d"
# 売上サマリー LIFF（LINE Developers で LIFF作成後に設定）
LIFF_ID_SALES = "2010598812-deTtkaIz"
# 班長シフト閲覧 LIFF（エンドポイントURL: https://bentenclub.com/liff/kancho-shift。LINE Developers で LIFF作成後に設定）
LIFF_ID_KANCHO_SHIFT = ""
# 権限不明者（友達追加直後）用リッチメニュー。「LINE連携」ボタン→ステータス選択の入口（未作成なら空のまま=メニューなし）
RICHMENU_ID_UNKNOWN = "richmenu-0b1281b87a1f1bf195ec5b3d4910fa3a"
# シフト表PDF用 日本語TTFフォントのURL（動作確認済み。変える場合はTTF形式のみ・OTF/可変フォントはグリフ欠けする）
# R2を使う場合は下の [[r2_buckets]] を有効化してフォントをアップロードする（R2が優先）
BENTEN_FONT_URL = "https://raw.githubusercontent.com/minoryorg/Noto-Sans-CJK-JP/master/fonts/NotoSansCJKjp-Regular.ttf"
# シークレット値は wrangler secret put で登録すること（このファイルには記載しない）
# npx wrangler secret put SETUP_KEY
# npx wrangler secret put LINE_CHANNEL_SECRET
# npx wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
# npx wrangler secret put LINE_REG_PWD_VEHICLE       ← 車番管理者 登録パスワード
# npx wrangler secret put LINE_REG_PWD_OPERATIONS    ← 運行管理者 登録パスワード
# npx wrangler secret put LINE_REG_PWD_GENERAL       ← 統括管理者 登録パスワード
# npx wrangler secret put LINE_REG_PWD_BENTEN        ← ベンテンクラブ会員 登録パスワード
# npx wrangler secret put LINE_REG_PWD_BENTEN_MASTER ← ベンテンシフトマスター 登録パスワード
# npx wrangler secret put LINE_REG_PWD_CREW_MEMBER   ← 乗務社員 登録パスワード

# ベンテンPDFフォント用R2（使う場合はコメントを外し、バケット作成後にフォントを置く）
# npx wrangler r2 bucket create benten-fonts
# npx wrangler r2 object put benten-fonts/NotoSansJP-Regular.ttf --file=NotoSansJP-Regular.ttf --remote
# [[r2_buckets]]
# binding = "BENTEN_FONTS"
# bucket_name = "benten-fonts"

[[routes]]
pattern = "bentenclub.com/s7db8q6wys*"
zone_name = "bentenclub.com"

[[routes]]
pattern = "bentenclub.com/api*"
zone_name = "bentenclub.com"

[[routes]]
pattern = "bentenclub.com/liff*"
zone_name = "bentenclub.com"

[[routes]]
pattern = "bentenclub.com/form*"
zone_name = "bentenclub.com"

[[routes]]
pattern = "bentenclub.com/robots.txt"
zone_name = "bentenclub.com"

[triggers]
crons = ["0 * * * *"]

# ローカル開発用
[dev]
port = 8787
